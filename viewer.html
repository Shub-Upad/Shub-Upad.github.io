<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Viewer | Scorpion Labs</title>
  <meta name="description" content="Scorpion Labs viewer for Quarto-rendered HTML and PDFs." />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="site-shell">
    <nav class="site-nav" aria-label="Primary navigation">
      <div class="nav-inner">
        <a href="index.html" class="nav-logo">SCORPION<span>_</span>LABS</a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-label="Toggle menu">Menu</button>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li class="nav-dropdown">
            <button class="nav-dropdown-trigger" type="button" aria-haspopup="true" aria-expanded="false">Research</button>
            <ul class="nav-dropdown-menu" aria-label="Research pages">
              <li><a href="mechint.html">MechInt</a></li>
              <li><a href="mlsys.html">MLSys</a></li>
              <li><a href="historical.html">Historical</a></li>
              <li><a href="experiments.html">Experiments</a></li>
            </ul>
          </li>
          <li><a href="about.html">About</a></li>
        </ul>
      </div>
    </nav>

    <main class="main">
      <header class="page-intro container viewer-intro">
        <p class="section-label">Writing</p>
        <h1 class="section-title visually-hidden" id="viewer-title">Viewer</h1>
        <p class="post-meta" id="viewer-meta"></p>
        <div class="post-actions viewer-actions" id="viewer-actions">
          <button class="btn btn-primary" type="button" id="toggle-read">Read</button>
          <button class="btn btn-secondary" type="button" id="toggle-pdf">PDF</button>
          <a class="btn btn-secondary" id="viewer-back" href="mechint.html#writing" hidden>Back to hub</a>
        </div>
      </header>

      <section class="section container">
        <div class="post-error empty-state" id="viewer-error" hidden>
          <p id="viewer-error-text"></p>
        </div>

        <div class="viewer-frame" id="viewer-frame" hidden>
          <iframe class="viewer-embed" id="viewer-iframe" title="Post viewer" loading="lazy"></iframe>
          <p class="post-fallback" id="viewer-fallback" hidden></p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer-inner">
        <p class="footer-left">© 2026 Scorpion Labs | scorpionlabs.me</p>
      </div>
    </footer>
  </div>

  <script src="main.js"></script>
  <script src="viewer.js"></script>
</body>

</html>
